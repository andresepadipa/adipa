<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tutorial: Segmento de click de correo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:760px;margin:0 auto}
.header{margin-bottom:2rem}
.header h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.header p{font-size:13px;color:#888}
.steps-nav{display:flex;align-items:center;gap:0;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:6px}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:54px}
.dot{width:30px;height:30px;border-radius:50%;border:1.5px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#aaa;transition:all .2s}
.step-dot.active .dot{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.step-dot.done .dot{background:#22c55e;color:#fff;border-color:#22c55e}
.dot-label{font-size:10px;color:#aaa;text-align:center;max-width:54px;line-height:1.2}
.step-dot.active .dot-label{color:#1a1a1a;font-weight:500}
.step-dot.done .dot-label{color:#22c55e}
.step-connector{flex:1;height:1px;background:#e0e0e0;min-width:8px;margin-bottom:18px}
.step-header{background:#1a1a1a;color:#fff;border-radius:12px 12px 0 0;padding:1rem 1.25rem;display:flex;align-items:center;gap:10px}
.step-header h2{font-size:15px;font-weight:600;flex:1;line-height:1.4}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.15);color:#fff;white-space:nowrap}
.step-body{background:#fff;border-radius:0 0 12px 12px;border:1px solid #e8e8e8;border-top:none;padding:1.25rem}
.sub-steps{list-style:none;margin:0 0 4px}
.sub-steps li{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:#444;align-items:flex-start;line-height:1.6}
.num{min-width:22px;height:22px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#888;flex-shrink:0;margin-top:1px}
.img-wrap{margin:14px 0;border-radius:8px;overflow:hidden;border:1px solid #e8e8e8}
.img-wrap img{width:100%;display:block}
.img-caption{font-size:11px;color:#999;padding:6px 10px;background:#fafafa;border-top:1px solid #f0f0f0}
.tip{background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:10px 12px;margin-top:12px;font-size:12px;color:#92400e;line-height:1.6}
.tip-green{background:#f0fdf4;border-left:3px solid #22c55e;border-radius:0 8px 8px 0;padding:10px 12px;margin-top:12px;font-size:12px;color:#166534;line-height:1.6}
.tip-blue{background:#eff6ff;border-left:3px solid #3b82f6;border-radius:0 8px 8px 0;padding:10px 12px;margin-top:12px;font-size:12px;color:#1e40af;line-height:1.6}
.tip-red{background:#fff1f2;border-left:3px solid #ef4444;border-radius:0 8px 8px 0;padding:10px 12px;margin-top:12px;font-size:12px;color:#991b1b;line-height:1.6}
.divider{border:none;border-top:1px solid #f0f0f0;margin:14px 0}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-right:4px;font-weight:500}
.tag-blue{background:#eff6ff;color:#2563eb}
.tag-green{background:#f0fdf4;color:#16a34a}
.tag-warn{background:#fff7ed;color:#c2410c}
.tag-gray{background:#f3f4f6;color:#6b7280}
.highlight-box{background:#f8faff;border:1.5px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:12px;color:#1e3a5f;line-height:1.6}
.highlight-box strong{color:#1d4ed8}
.nav-btns{display:flex;justify-content:space-between;margin-top:1.25rem;gap:12px}
.nav-btns button{padding:8px 22px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#555;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btns button:hover{background:#f5f5f5}
.nav-btns button.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.nav-btns button.primary:hover{background:#333}
#step-content{animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Tutorial: Segmento de click de correo</h1>
    <p>Flujo para activar y enviar WA a contactos que hicieron clic en un correo de campa&ntilde;a.</p>
  </div>
  <div class="steps-nav" id="steps-nav">
    <div class="step-dot active" onclick="goTo(0)" id="dot-0"><div class="dot">1</div><div class="dot-label">Ir a Segmentos</div></div>
    <div class="step-connector"></div>
    <div class="step-dot" onclick="goTo(1)" id="dot-1"><div class="dot">2</div><div class="dot-label">Buscar y editar</div></div>
    <div class="step-connector"></div>
    <div class="step-dot" onclick="goTo(2)" id="dot-2"><div class="dot">3</div><div class="dot-label">Seleccionar correo</div></div>
    <div class="step-connector"></div>
    <div class="step-dot" onclick="goTo(3)" id="dot-3"><div class="dot">4</div><div class="dot-label">Guardar</div></div>
    <div class="step-connector"></div>
    <div class="step-dot" onclick="goTo(4)" id="dot-4"><div class="dot">5</div><div class="dot-label">Enviar WA</div></div>
  </div>
  <div id="step-content"></div>
  <div class="nav-btns">
    <button id="btn-prev" onclick="prev()">&#8592; Anterior</button>
    <button id="btn-next" class="primary" onclick="next()">Siguiente &#8594;</button>
  </div>
</div>

var current = 0;

function render() {
  var s = steps[current];
  document.getElementById('step-content').innerHTML =
    '<div class="step-header"><h2>' + s.title + '</h2><span class="badge">' + s.badge + '</span></div>' +
    '<div class="step-body">' + s.html() + '</div>';
  for (var i = 0; i < steps.length; i++) {
    var d = document.getElementById('dot-' + i);
    d.className = 'step-dot' + (i === current ? ' active' : i < current ? ' done' : '');
  }
  document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
  var nb = document.getElementById('btn-next');
  if (current === steps.length - 1) {
    nb.textContent = '\u2713 Completado';
    nb.onclick = function() {};
  } else {
    nb.innerHTML = 'Siguiente &#8594;';
    nb.onclick = next;
  }
}

function goTo(i) { current = i; render(); }
function next() { if (current < steps.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }

render();
</script>
